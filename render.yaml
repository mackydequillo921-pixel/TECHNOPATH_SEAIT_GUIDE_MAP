# Render Blueprint for TechnoPath SEAIT Guide Map - v6
# Deploys: Frontend (Static Site) + Backend (Web Service) + SQLite Database

services:
  # Frontend - Vue.js Static Site
  - type: web
    name: technopath-frontend
    runtime: node
    plan: free
    buildCommand: cd frontend && rm -rf dist node_modules/.vite && npm install && npm run build
    startCommand: cd frontend/dist && npx serve -s . -p $PORT
    envVars:
      - key: VITE_API_BASE_URL
        value: https://technopath-backend-or73.onrender.com/api
      - key: VITE_FLASK_CHATBOT_URL
        value: https://technopath-chatbot-dyod.onrender.com

  # Backend - Django Web Service
  - type: web
    name: technopath-backend
    runtime: python
    plan: free
    rootDir: backend_django
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: bash render_start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,.onrender.com,technopath-backend-or73.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://technopath-frontend-dyod.onrender.com,https://technopath-frontend-or73.onrender.com,https://technopath-frontend.onrender.com,http://localhost:5173"
      - key: FLASK_CHATBOT_URL
        value: "https://technopath-chatbot-dyod.onrender.com"
      - key: DATABASE_URL
        value: sqlite:///tmp/technopath.db

  # Chatbot - Flask Web Service
  - type: web
    name: technopath-chatbot
    runtime: python
    plan: free
    rootDir: chatbot_flask
    buildCommand: pip install -r requirements.txt && pip install gunicorn
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
