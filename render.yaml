# Render Blueprint for TechnoPath SEAIT Guide Map - v2
# Deploys: Frontend (Static Site) + Backend (Web Service) + Database (SQLite on Disk)

services:
  # Frontend - Vue.js Static Site
  - type: web
    name: technopath-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://technopath-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend - Django Web Service
  - type: web
    name: technopath-backend
    runtime: python
    plan: free
    rootDir: backend_django
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: bash render_start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,.onrender.com,technopath-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://technopath-frontend.onrender.com,http://localhost:5173"
      - key: DATABASE_URL
        value: sqlite:///data/technopath.db
    disk:
      name: technopath-data
      mountPath: /data
      sizeGB: 1

# Optional: PostgreSQL Database (uncomment to use instead of SQLite)
# databases:
